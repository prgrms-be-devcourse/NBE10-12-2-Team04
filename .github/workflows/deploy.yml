name: Deploy to VM

on:
  push:
    branches:
      - main
# 레포 소유자 설정
env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nbe10-12-2-team04-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nbe10-12-2-team04-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 해당 job의 권한 설정 기본 read-only
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # 워크플로우 트리거한 사용자
          username: ${{ github.actor }}
          # github actions가 매 실행마다 자동 발급하는 임시 토큰
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # 도커 빌드 엔진, cache-from 기능 사용하기 위해 사용
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./back
          push: true
          # 태그 두 개, latest 배포에 사용, github.sha 이전 커밋 sha 이미지 롤백용
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          build-args: |
            LOG_DIR=${{ vars.LOG_DIR }}
            IMAGE_UPLOAD=${{ vars.IMAGE_UPLOAD }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # github actions가 제공하는 캐시 저장소에 빌드 레이어를 저장하고 재사용

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create production env file
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}"
            echo "MYSQL_DATABASE=${MYSQL_DATABASE}"
            echo "MYSQL_USER=${MYSQL_USER}"
            echo "MYSQL_PASSWORD=${MYSQL_PASSWORD}"
            echo "SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}"
            echo "JWT_SECRET_KEY=${JWT_SECRET_KEY}"
            echo "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}"
            echo "LOG_DIR=${LOG_DIR}"
            echo "IMAGE_UPLOAD=${IMAGE_UPLOAD}"
            echo "SERVING_UPLOAD_PATH=${SERVING_UPLOAD_PATH}"
            echo "THUMBNAIL_UPLOAD_PATH=${THUMBNAIL_UPLOAD_PATH}"
            echo "PROFILE_UPLOAD_PATH=${PROFILE_UPLOAD_PATH}"
            echo "PUBLIC_PREFIX=${PUBLIC_PREFIX}"
            echo "IMAGE_FILE_SIZE=${IMAGE_FILE_SIZE}"
            echo "MAX_IMAGE_FILES_SIZE=${MAX_IMAGE_FILES_SIZE}"
            echo "ACCESS_TOKEN_EXPIRATION_SECONDS=${ACCESS_TOKEN_EXPIRATION_SECONDS}"
            echo "REFRESH_TOKEN_EXPIRATION_SECONDS=${REFRESH_TOKEN_EXPIRATION_SECONDS}"
            echo "THUMBNAIL_WIDTH=${THUMBNAIL_WIDTH}"
            echo "THUMBNAIL_HEIGHT=${THUMBNAIL_HEIGHT}"
            echo "GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}"
            echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}"
            echo "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}"
            echo "SITE_ADDR=${SITE_ADDR}"
          } > .env.prod
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          LOG_DIR: ${{ vars.LOG_DIR }}
          IMAGE_UPLOAD: ${{ vars.IMAGE_UPLOAD }}
          SERVING_UPLOAD_PATH: ${{ vars.SERVING_UPLOAD_PATH }}
          THUMBNAIL_UPLOAD_PATH: ${{ vars.THUMBNAIL_UPLOAD_PATH }}
          PROFILE_UPLOAD_PATH: ${{ vars.PROFILE_UPLOAD_PATH }}
          PUBLIC_PREFIX: ${{ vars.PUBLIC_PREFIX }}
          IMAGE_FILE_SIZE: ${{ vars.IMAGE_FILE_SIZE }}
          MAX_IMAGE_FILES_SIZE: ${{ vars.MAX_IMAGE_FILES_SIZE }}
          ACCESS_TOKEN_EXPIRATION_SECONDS: ${{ vars.ACCESS_TOKEN_EXPIRATION_SECONDS }}
          REFRESH_TOKEN_EXPIRATION_SECONDS: ${{ vars.REFRESH_TOKEN_EXPIRATION_SECONDS }}
          THUMBNAIL_WIDTH: ${{ vars.THUMBNAIL_WIDTH }}
          THUMBNAIL_HEIGHT: ${{ vars.THUMBNAIL_HEIGHT }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          SITE_ADDR: ${{ vars.SITE_ADDR }}

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p ~/NBE10-12-2-Team04

      - name: Copy deploy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,.env.prod"
          target: "~/NBE10-12-2-Team04"

      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/NBE10-12-2-Team04
            chmod 600 .env.prod
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
