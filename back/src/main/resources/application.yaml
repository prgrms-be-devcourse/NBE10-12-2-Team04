spring:
  application:
    name: triptrace
  profiles:
    active: dev, image-processor
  output:
    ansi:
      enabled: always
  datasource:
    hikari:
      auto-commit: false
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

springdoc:
  default-produces-media-type: application/json;charset=UTF-8

logging:
  level:
    com.triptrace: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    org.springframework.transaction.interceptor: TRACE

custom:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    secretKey: ${JWT_SECRET_KEY}
  accessToken:
    expirationSeconds: ${ACCESS_TOKEN_EXPIRATION_SECONDS:18000} # 5시간
  refreshToken:
    expirationSeconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:604800} # 7일
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
  profileImage: ${TEMP_PROFILE_IMAGE}
