spring:
  application:
    name: triptrace
  profiles:
    active: dev
  output:
    ansi:
      enabled: always
  datasource:
    hikari:
      auto-commit: false
  servlet:
    multipart:
      max-file-size: ${IMAGE_FILE_SIZE:10MB}
      max-request-size: ${MAX_IMAGE_FILES_SIZE:100MB}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

springdoc:
  default-produces-media-type: application/json;charset=UTF-8

logging:
  level:
    com.triptrace: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    org.springframework.transaction.interceptor: TRACE

custom:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    secretKey: ${JWT_SECRET_KEY:abcdefghijklmnopqrstuvwxyz0123456789}
  accessToken:
    expirationSeconds: ${ACCESS_TOKEN_EXPIRATION_SECONDS:18000} # 5시간
  refreshToken:
    expirationSeconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:604800} # 7일
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
  ext:
    jpg: jpeg
  upload:
    path: ${IMAGE_UPLOAD:/images}
    serving-path: ${SERVING_UPLOAD_PATH:serving}
    thumbnail-path: ${THUMBNAIL_UPLOAD_PATH:thumbnail}
    profile-path: ${PROFILE_UPLOAD_PATH:profile}
    serving-url: ${SERVING_UPLOAD_URL:/images/serving}
    thumbnail-url: ${THUMBNAIL_UPLOAD_URL:/images/thumbnail}
    profile-url: ${PROFILE_UPLOAD_URL:/images/profile}
  thumbnail:
    width: ${THUMBNAIL_WIDTH:1024}
    height: ${THUMBNAIL_HEIGHT:1024}
